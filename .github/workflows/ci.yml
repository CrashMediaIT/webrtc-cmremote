name: ci

# Five-platform CI matrix per ADR 0001 (CMRemote webrtc fork instructions),
# Question 5: build & test on every supported CMRemote target so a green
# branch is sufficient evidence to tag `v<upstream>-cmremote.<rev>` and
# consume the fork from `agent-rs/` via `[patch.crates-io]`.
#
# This workflow covers both long-lived branches of the fork:
#   * `cmremote/v0.5.4-aws-lc-rs` (dtls-only, ADR Steps 1–9)
#   * `cmremote/v0.17.0-aws-lc-rs` (monorepo: webrtc/, dtls/, stun/, turn/,
#     ADR Steps 10–18)
# plus `main`, where the active branch HEAD is fast-forwarded for visibility.

on:
  push:
    branches:
      - main
      - 'cmremote/**'
  pull_request:
    branches:
      - main
      - 'cmremote/**'

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
          - target: x86_64-apple-darwin
            runner: macos-13
          - target: aarch64-apple-darwin
            runner: macos-14
    steps:
      - uses: actions/checkout@v5

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # aws-lc-rs builds the AWS-LC C library from source. On Windows it
      # additionally requires NASM for the x86_64 assembly paths; cmake is
      # pre-installed on all GitHub-hosted runners.
      - name: Install NASM (Windows only)
        if: runner.os == 'Windows'
        uses: ilammy/setup-nasm@v1

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: cargo build
        run: cargo build --workspace --verbose --target ${{ matrix.target }}

      - name: cargo test
        run: cargo test --workspace --verbose --target ${{ matrix.target }}

  lint:
    name: rustfmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  no-banned-crates:
    name: dep-graph free of ring / webpki
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      # Hard precondition for tagging per runbook Step 4.5: the lockfile must
      # contain none of the crates the CMRemote `agent-rs/` workspace bans
      # (`ring`, `webpki`). `rustls` itself is intentionally NOT banned —
      # it is consumed here with the `aws_lc_rs` feature so the crypto
      # provider is `aws-lc-rs`, satisfying the ADR's intent.
      #
      # NOTE: `cargo tree -i <pkg>` exits 0 with a warning to stderr when the
      # package is absent, so we check stdout for an actual tree (a non-empty
      # line that does not start with `warning:`).
      - name: Assert no `ring` in dep graph
        run: |
          output=$(cargo tree -i ring 2>/dev/null || true)
          if [ -n "$output" ]; then
            echo "::error::ring is present in the dep graph"
            echo "$output"
            exit 1
          fi

      - name: Assert no `webpki` in dep graph
        run: |
          output=$(cargo tree -i webpki 2>/dev/null || true)
          if [ -n "$output" ]; then
            echo "::error::webpki is present in the dep graph"
            echo "$output"
            exit 1
          fi

      # Belt-and-braces: confirm rustls is not pulling ring transitively.
      - name: Assert rustls is using aws_lc_rs (no ring under rustls)
        run: |
          if cargo tree -i ring 2>/dev/null | grep -q rustls; then
            echo "::error::rustls is pulling ring transitively"
            exit 1
          fi
